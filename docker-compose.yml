services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres_airflow:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"

  airflow-init:
    image: apache/airflow:2.8.0
    depends_on:
      - postgres_airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"

  airflow-webserver:
    image: apache/airflow:2.8.0
    depends_on:
      - airflow-init
      - postgres_airflow
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "geostream-secret-key"
      GEOSTREAM_DB_HOST: host.docker.internal
      GEOSTREAM_DB_PORT: 5432
      GEOSTREAM_DB_NAME: geostream
      GEOSTREAM_DB_USER: postgres
      GEOSTREAM_DB_PASSWORD: jelica22
      _PIP_ADDITIONAL_REQUIREMENTS: "kafka-python"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: airflow webserver

  airflow-scheduler:
    image: apache/airflow:2.8.0
    depends_on:
      - airflow-init
      - postgres_airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "geostream-secret-key"
      GEOSTREAM_DB_HOST: host.docker.internal
      GEOSTREAM_DB_PORT: 5432
      GEOSTREAM_DB_NAME: geostream
      GEOSTREAM_DB_USER: postgres
      GEOSTREAM_DB_PASSWORD: jelica22
      _PIP_ADDITIONAL_REQUIREMENTS: "kafka-python"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: airflow scheduler
